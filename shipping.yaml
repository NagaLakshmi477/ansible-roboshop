- name: configure shipping component
  hosts: shipping
  become: yes
  tasks:
  - name: install maven
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
      - maven
      - mysql

  - name: create roboshop user
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      system: true
      home: /app
  
  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: download the files from path 
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/shipping-v3.zip
      dest: /tmp/shipping.zip
  

  
  - name: unzip the shipping floder
    ansible.builtin.unarchive:
      src: /tmp/shipping.zip
      dest: /app
      remote_src: yes

  - name: install maven dependies
    ansible.builtin.command: mvn clean package
    args:
      chdir: /app

  - name: rename the jar file 
    ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
    args:
      chdir: /app

  - name: copy the shipping service files
    ansible.builtin.copy:
      src: shipping.service
      dest: /etc/systemd/system/shipping.service


  - name: reload the shipping service
    ansible.builtin.systemd_service:
      daemon_reload: true
      
  - name: start and enable the service
    ansible.builtin.service:
      name: shipping
      state: started
      enabled: yes 
      # installing python dependies for mysql client
  - name: install PyMySQL and cryptography
    ansible.builtin.pip:
      name: "{{ item  }}"
      executable: pip3.9
    loop:
      - cryptography
      - PyMySQL

  # - name: connect mysql using app user
  #   community.mysql.mysql_info:
  #     login_user: shipping
  #     login_password: RoboShop@1
  #     login_host: mysql.nagalakshmi.site
  #     login_db: cities
  - name: import the data
    community.mysql.mysql_db:
      login_user: root 
      login_password: RoboShop@1
      login_host: mysql.nagalakshmi.site
      state: import
      target: "{{ item }}"
    loop:
        - /app/db/schema.sql
        - /app/db/app-user.sql 
        - /app/db/master-data.sql
  - name: start and enable shipping
    ansible.builtin.service:
      name: shipping
      state: restarted
      
